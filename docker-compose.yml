version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cine-swipe-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cineswipe-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cine-swipe-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - cineswipe-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cine-swipe-backend
    env_file:
      - .env
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - rabbitmq
    networks:
      - cineswipe-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cine-swipe-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cineswipe-network

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  cineswipe-network:
    driver: bridge
