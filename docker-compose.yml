services:
  database:
    image: postgres:16-alpine
    container_name: cineswipe_db
    environment:
      POSTGRES_USER: cineswipe
      POSTGRES_PASSWORD: cineswipe
      POSTGRES_DB: cineswipe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineswipe -d cineswipe"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cineswipe_rmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cineswipe_backend
    env_file:
      - ./.env
    ports:
      - "3001:3001"
    command: sh -c "npm run start:prod:migrate"
    environment:
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgres}
      DATABASE_URL: postgresql://cineswipe:cineswipe@database:5432/cineswipe?schema=public
      AUTH_MODE: ${AUTH_MODE:-local}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-local}
      MEDIA_STORAGE_PROVIDER: ${MEDIA_STORAGE_PROVIDER:-local}
      PAYMENT_FLOW_MODE: ${PAYMENT_FLOW_MODE:-rmq}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      BACKEND_BASE_URL: http://localhost:3001
      PORT: 3001
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_FRONTEND_URL: http://localhost:3000
      CSP_ENABLED: "true"
      CSP_REPORT_ONLY: "false"
      CSP_CONNECT_SRC: "http://localhost:3000,http://localhost:3001"
      RABBITMQ_PUBLISH_TIMEOUT_MS: 5000
      RABBITMQ_PAYMENT_DLQ: payment_queue_dlq
      STRIPE_CURRENCY: brl
      STRIPE_WEBHOOK_SECRET: ""
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-}
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET:-}
      FIREBASE_STORAGE_PUBLIC: ${FIREBASE_STORAGE_PUBLIC:-false}
      FIREBASE_AUTH_EMULATOR_HOST: ${FIREBASE_AUTH_EMULATOR_HOST:-}
      CSRF_ENABLED: "true"
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAMESITE: lax
      AUTH_ACCESS_COOKIE_MAX_AGE_MS: 86400000
      AUTH_REFRESH_COOKIE_MAX_AGE_MS: 604800000
      UPLOAD_MAX_FILE_SIZE_MB: 10
      UPLOAD_ALLOWED_MIME_TYPES: image/jpeg,image/png,image/webp
      PAGINATION_DEFAULT_PAGE: 1
      PAGINATION_DEFAULT_LIMIT: 12
      PAGINATION_MAX_LIMIT: 50
      PAYMENT_OUTBOX_BATCH_SIZE: 25
      PAYMENT_OUTBOX_MAX_ATTEMPTS: 5
      PAYMENT_OUTBOX_DISPATCH_INTERVAL_MS: 3000
      PAYMENT_OUTBOX_RETRY_DELAY_MS: 2000
      CREDIT_PAYMENT_MAX_RETRIES: 3
      CREDIT_OUTBOX_BATCH_SIZE: 25
      CREDIT_OUTBOX_MAX_ATTEMPTS: 5
      CREDIT_OUTBOX_DISPATCH_INTERVAL_MS: 3000
      CREDIT_OUTBOX_RETRY_DELAY_MS: 2000
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_START_THEME: dark
    container_name: cineswipe_frontend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    command: sh -c "npm run start"
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      START_THEME: dark
      NEXT_PUBLIC_START_THEME: dark
    depends_on:
      backend:
        condition: service_started

volumes:
  pgdata:
  backend_uploads:
